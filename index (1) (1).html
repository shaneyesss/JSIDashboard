<!DOCTYPE html>
<html>
<head>
    <title>No-Show Risk Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
            color: #333;
        }
        h1 {
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
        }
        h2 {
            color: #34495e;
        }
        form {
            background-color: #ecf0f1;
            padding: 20px;
            border-radius: 4px;
            margin: 20px 0;
        }
        label {
            display: block;
            margin: 10px 0 5px 0;
            font-weight: bold;
        }
        input, select {
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 1em;
        }
        button {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
        }
        button:hover {
            background-color: #2980b9;
        }
        .nav-button {
            display: inline-block;
            background-color: #27ae60;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            text-decoration: none;
            margin-top: 20px;
        }
        .nav-button:hover {
            background-color: #229954;
            text-decoration: none;
        }
        .result {
            background-color: #d5f4e6;
            padding: 20px;
            border-radius: 4px;
            margin-top: 20px;
            border-left: 4px solid #27ae60;
        }
    </style>
</head>
<body>
    <h1>No-Show Risk Predictor</h1>
    <a href="/landing" class="nav-button">About This Tool</a>

    <form method="POST">
        <label>Prior No-Shows:</label>
        <input type="number" name="prior_no_shows" required><br><br>

        <label>Lead Time (days):</label>
        <input type="number" name="lead_time" required><br><br>

        <label>Insurance Type:</label>
        <select name="insurance_type">
            <option value="private">Private Insurance</option>
            <option value="public">Public Insurance</option>
            <option value="uninsured">Uninsured</option>
        </select><br><br>

        <label>Appointment Time:</label>
        <select name="appt_time">
            <option value="morning">Morning</option>
            <option value="afternoon">Afternoon</option>
            <option value="evening">Evening</option>
        </select><br><br>

        <label>Distance from Clinic:</label>
        <select name="distance">
            <option value="near">Near (0-5 miles)</option>
            <option value="moderate">Moderate (5-15 miles)</option>
            <option value="far">Far (15+ miles)</option>
        </select><br><br>

        <label>Age:</label>
        <input type="number" name="age" min="0" required><br><br>

        <button type="submit">Calculate Risk</button>
    </form>

    {% if score is defined %}
        <div class="result">
            <h2>Result</h2>
            <p><strong>Score:</strong> {{ score }}</p>
            <p><strong>Risk Level:</strong> {{ risk }}</p>

            <p><strong>Reasons:</strong></p>
            <ul>
                {% for reason in reasons %}
                    <li>{{ reason }}</li>
                {% endfor %}
            </ul>
        </div>
    {% endif %}

</body>
</html>
