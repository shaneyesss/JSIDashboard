<!DOCTYPE html>
<html>
<head>
    <title>No-Show Risk Predictor</title>
</head>
<body>
    <h1>No-Show Risk Predictor</h1>

    <form method="POST">
        <label>Prior No-Shows:</label>
        <input type="number" name="prior_no_shows" required><br><br>

        <label>Lead Time (days):</label>
        <input type="number" name="lead_time" required><br><br>

        <label>Insurance Type:</label>
        <select name="insurance_type">
            <option value="private">Private Insurance</option>
            <option value="public">Public Insurance</option>
            <option value="uninsured">Uninsured</option>
        </select><br><br>

        <label>Appointment Time:</label>
        <select name="appt_time">
            <option value="morning">Morning</option>
            <option value="afternoon">Afternoon</option>
            <option value="evening">Evening</option>
        </select><br><br>

        <label>Distance from Clinic:</label>
        <select name="distance">
            <option value="near">Near (0-5 miles)</option>
            <option value="moderate">Moderate (5-15 miles)</option>
            <option value="far">Far (15+ miles)</option>
        </select><br><br>

        <label>Age:</label>
        <input type="number" name="age" min="0" required><br><br>

        <button type="submit">Calculate Risk</button>
    </form>

    {% if score is defined %}
        <h2>Result</h2>
        <p><strong>Score:</strong> {{ score }}</p>
        <p><strong>Risk Level:</strong> {{ risk }}</p>

        <p><strong>Reasons:</strong></p>
        <ul>
            {% for reason in reasons %}
                <li>{{ reason }}</li>
            {% endfor %}
        </ul>
    {% endif %}

</body>
</html>
